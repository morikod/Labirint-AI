services:
  app:
    build: .
    ports:
      - "5000"
    environment:
      - DATABASE_URL=postgresql://student:heslo123@db:5432/giftmind
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=student
      - POSTGRES_PASSWORD=heslo123
      - POSTGRES_DB=giftmind
      - PGDATA=/data/pgdata
