<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Labyrint v1.2</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div id="game-container">
    <div class="header">
        <span>[ AI GAME MASTER v1.2 ]</span>
        <select id="lang-select">
            <option value="cs">Čeština 🇨🇿</option>
            <option value="en">English 🇺🇸</option>
        </select>
    </div>
    
    <div id="output">[ SYSTEM ]: Zadejte 3 slova pro začátek hry...</div>
    
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Zadejte slova nebo A, B, C..." autofocus autocomplete="off">
        <button id="send-btn">HRÁT</button>
        <button id="stop-btn">RESET</button>
    </div>
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
