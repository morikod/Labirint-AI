<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>AI Dárkový Asistent</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="sidebar">
    <h2>Profily</h2>
    <button onclick="openForm()">+ Přidat</button>
    <div id="profiles"></div>
</div>

<div class="main">
    <div id="welcome" class="welcome"></div>
    <div id="chat"></div>
    <div class="input-area">
        <input id="message" placeholder="Zeptej se AI...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<div id="form" class="modal hidden">
    <h3>Nový profil</h3>
    <input id="name" placeholder="Jméno">

    <div class="tags" id="tagContainer"></div>

    <textarea id="desc" placeholder="Popis osoby"></textarea>
    <input id="budget" placeholder="Rozpočet (Kč)">
    <input id="reason" placeholder="Příležitost">

    <button onclick="createProfile()">Uložit</button>
</div>

<script src="/static/script.js"></script>
</body>
</html>
